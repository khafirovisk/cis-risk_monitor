server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # SPA
    location / {
        try_files $uri /index.html;
    }

    # API -> container do backend
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Repassa o proto original do cliente (definido pelo Nginx do host,
        # na frente deste container) em vez de usar $scheme, que aqui seria
        # sempre "http" (tráfego interno Docker) — isso faria o cookie de
        # sessão (secure:true em produção) nunca ser aceito pelo navegador.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
