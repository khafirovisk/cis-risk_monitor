# Nginx reverse proxy (host) com certificado TLS AUTOASSINADO — usado quando
# ainda não há DNS público apontando para este servidor. O navegador vai
# mostrar aviso de "conexão não segura" até você trocar por um certificado
# real (rode `sudo ./install.sh` de novo e escolha Let's Encrypt quando o
# DNS público estiver pronto).

server {
    listen 80;
    server_name grc.suaempresa.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grc.suaempresa.com.br;

    ssl_certificate     /etc/nginx/ssl/grc.suaempresa.com.br/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/grc.suaempresa.com.br/privkey.pem;

    client_max_body_size 25m;   # upload de evidências

    # --- Opção Docker Compose: proxy tudo para o container web (8080) ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Opção nativa (sem Docker): descomente e ajuste ---
    # root /opt/sentinela/frontend/dist;
    # index index.html;
    # location / { try_files $uri /index.html; }
