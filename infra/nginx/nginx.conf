# Nginx reverse proxy (host) — coloque na frente do docker-compose (porta 8080)
# ou, no modo nativo, sirva o frontend/dist e faça proxy para a API em :3000.

server {
    listen 80;
    server_name grc.suaempresa.com.br;

    # (certbot adiciona o bloco 443 + redirect automaticamente)

    client_max_body_size 25m;   # upload de evidências

    # --- Opção Docker Compose: proxy tudo para o container web (8080) ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Opção nativa (sem Docker): descomente e ajuste ---
    # root /opt/sentinela/frontend/dist;
    # index index.html;
    # location / { try_files $uri /index.html; }
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
